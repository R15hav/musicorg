site_name: musicorg
site_url: https://R15hav.github.io/musicorg/
repo_url: https://github.com/R15hav/musicorg
repo_name: R15hav/musicorg
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - Getting Started:
    - Install: install.md
    - Wizard: wizard.md
  - Reference:
    - CLI Reference: cli-reference.md
    - TUI Screens: tui.md
    - Upgrade (ALAC): upgrade.md
  - Deep Dives:
    - Architecture: architecture.md
    - Troubleshooting: troubleshooting.md
  - Contributing:
    - Development: development.md

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true

plugins:
  - search
